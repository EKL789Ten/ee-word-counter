# wrangler.toml — optional Pages project config.
# Not required if you run `wrangler pages deploy <dir>` with --project-name,
# but keeping this file makes `wrangler pages dev` and CI runs reproducible.

name = "ee-word-counter"              # <-- CF_PAGES_PROJECT placeholder
compatibility_date = "2026-04-21"
pages_build_output_dir = "."

